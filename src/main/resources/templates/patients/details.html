<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détails patient</title>
</head>
<body>
<h1>Détails du patient</h1>

<p><b>Nom :</b> <span th:text="${patient.nom}"></span></p>
<p><b>Prénom :</b> <span th:text="${patient.prenom}"></span></p>
<p><b>Téléphone :</b> <span th:text="${patient.telephone}"></span></p>

<h2>Consultations</h2>
<table border="1">
    <tr>
        <th>Date</th>
        <th>Motif</th>
        <th>Diagnostic</th>
    </tr>
    <tr th:each="c : ${consultations}">
        <td th:text="${c.dateConsultation}"></td>
        <td th:text="${c.motif}"></td>
        <td th:text="${c.diagnostic}"></td>
    </tr>
</table>

<br>
<a th:href="@{/patients}">Retour</a>
</body>
</html>
