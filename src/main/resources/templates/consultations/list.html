<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultations</title>
</head>
<body>
<h1>Liste des consultations</h1>

<a th:href="@{/consultations/new}">Ajouter une consultation</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Motif</th>
        <th>Diagnostic</th>
        <th>Patient</th>
        <th>Actions</th>
    </tr>
    <tr th:each="c : ${consultations}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.dateConsultation}"></td>
        <td th:text="${c.motif}"></td>
        <td th:text="${c.diagnostic}"></td>
        <td th:text="${c.patient != null ? c.patient.nom + ' ' + c.patient.prenom : ''}"></td>
        <td>
            <a th:href="@{'/consultations/edit/' + ${c.id}}">Modifier</a>
            <a th:href="@{'/consultations/delete/' + ${c.id}}">Supprimer</a>
        </td>
    </tr>
</table>

<br>
<a th:href="@{/patients}">Voir les patients</a>
</body>
</html>
